# ─── Nginx reverse proxy for nunuIRL trading platform ──────────────────────
#
# HOW TO USE:
#   1. Install nginx: sudo apt install nginx
#   2. Copy this file: sudo cp infra/nginx.conf /etc/nginx/sites-available/nunuirl
#   3. Enable it:      sudo ln -s /etc/nginx/sites-available/nunuirl /etc/nginx/sites-enabled/
#   4. Remove default: sudo rm -f /etc/nginx/sites-enabled/default
#   5. Test config:    sudo nginx -t
#   6. Reload:         sudo systemctl reload nginx
#
# For HTTPS (strongly recommended):
#   sudo apt install certbot python3-certbot-nginx
#   sudo certbot --nginx -d yourdomain.com -d www.yourdomain.com
#
# Replace "yourdomain.com" below with your actual domain.
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name yourdomain.com www.yourdomain.com;

    # Increase max body size for any file uploads
    client_max_body_size 10M;

    # ── API (FastAPI on port 8000) ──────────────────────────────────────────
    # Routes /api/* and /v1/* to the Python backend
    location /api/ {
        proxy_pass         http://127.0.0.1:8000/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location /v1/ {
        proxy_pass         http://127.0.0.1:8000/v1/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location /health {
        proxy_pass http://127.0.0.1:8000/health;
    }

    location /seed {
        proxy_pass http://127.0.0.1:8000/seed;
    }

    # ── Web frontend (Next.js on port 3000) ────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    # ── Grafana (optional, expose at /grafana) ─────────────────────────────
    # Uncomment to expose Grafana dashboards at yourdomain.com/grafana/
    # location /grafana/ {
    #     proxy_pass http://127.0.0.1:3001/;
    #     proxy_set_header Host $host;
    # }
}

# ── After running certbot, it will add an HTTPS server block automatically ──
# Certbot will modify this file to redirect HTTP → HTTPS and add SSL config.
