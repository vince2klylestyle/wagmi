name: CI

on:
  push:
    branches: [main, claude/*]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pytest requests pandas numpy

      - name: Run unit tests
        working-directory: bot
        run: |
          python -m pytest tests/ -v --tb=short

      - name: Run golden replay test
        working-directory: bot
        run: |
          python -m pytest tests/test_golden_replay.py -v --tb=short

  replay-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pytest requests pandas numpy

      - name: Run replay on golden fixture
        working-directory: bot
        run: |
          python cli.py --mode replay --replay-file ../tests/fixtures/golden_replay.csv
