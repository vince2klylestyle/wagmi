<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>🎯 Bagworker Raids</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0e27;
            color: #fff;
            padding-bottom: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            border-bottom: 1px solid #1a1f3a;
            position: sticky;
            top: 0;
            background: #0a0e27;
            z-index: 10;
        }

        .header-left {
            font-size: 18px;
            font-weight: 700;
        }

        .header-right {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .badge {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            color: #ffd700;
        }

        .stats-row {
            display: flex;
            gap: 8px;
            padding: 8px 16px;
            border-bottom: 1px solid #1a1f3a;
            font-size: 12px;
            color: #888;
        }

        .stat {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .stat-value {
            color: #667eea;
            font-weight: 700;
        }

        .tweet-card {
            background: #1a1f3a;
            border: 1px solid #2a2f4a;
            border-radius: 12px;
            padding: 16px;
            margin: 16px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .tweet-card:active {
            opacity: 0.8;
        }

        .tweet-handle {
            color: #888;
            font-size: 12px;
            margin-bottom: 4px;
        }

        .tweet-text {
            font-size: 15px;
            line-height: 1.5;
            color: #e0e0e0;
        }

        .brand-tabs {
            display: flex;
            gap: 0;
            border-bottom: 1px solid #1a1f3a;
            padding: 0 16px;
            margin-top: 16px;
            overflow-x: auto;
        }

        .brand-tab {
            flex: 1;
            padding: 12px 8px;
            background: none;
            border: none;
            color: #888;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .brand-tab.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .brand-tab:active {
            opacity: 0.7;
        }

        .gallery-section {
            padding: 16px;
        }

        .gallery-label {
            font-size: 12px;
            color: #888;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-bottom: 12px;
            overflow-x: auto;
        }

        .gallery-item {
            aspect-ratio: 1;
            background-size: cover;
            background-position: center;
            border-radius: 8px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.15s;
        }

        .gallery-item:active {
            transform: scale(0.95);
        }

        .gallery-item.selected {
            border-color: #667eea;
            box-shadow: 0 0 0 2px rgba(102, 126, 234, 0.5);
        }

        .gallery-empty {
            text-align: center;
            padding: 24px 16px;
            color: #666;
            font-size: 13px;
        }

        .image-tags {
            font-size: 12px;
            color: #888;
            padding: 0 16px 12px 16px;
            max-height: 24px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .action-buttons {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            padding: 16px;
            border-top: 1px solid #1a1f3a;
        }

        .btn {
            padding: 12px 8px;
            border: none;
            border-radius: 8px;
            font-size: 12px;
            cursor: pointer;
            font-weight: 700;
            transition: all 0.15s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .btn-action {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-action:active {
            transform: scale(0.95);
            opacity: 0.8;
        }

        .btn-emoji {
            font-size: 18px;
        }

        .btn-label {
            font-size: 10px;
        }

        .btn-value {
            font-size: 11px;
            opacity: 0.8;
        }

        .loading {
            text-align: center;
            padding: 24px;
            color: #888;
            font-size: 13px;
        }

        .error {
            background: #3a1a1a;
            border: 1px solid #5a2a2a;
            color: #ff6b6b;
            padding: 12px 16px;
            border-radius: 8px;
            margin: 16px;
            font-size: 12px;
        }

        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 24px;
            border-radius: 24px;
            font-size: 14px;
            font-weight: 700;
            z-index: 100;
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        .leaderboard-section {
            padding: 16px;
            margin-top: 16px;
            border-top: 1px solid #1a1f3a;
        }

        .leaderboard-title {
            font-size: 12px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
        }

        .leaderboard-entry {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: #1a1f3a;
            border-radius: 8px;
            margin-bottom: 8px;
            border-left: 3px solid #667eea;
            font-size: 12px;
        }

        .leaderboard-entry.top1 {
            border-left-color: #ffd700;
        }

        .leaderboard-entry.top2 {
            border-left-color: #c0c0c0;
        }

        .leaderboard-entry.top3 {
            border-left-color: #cd7f32;
        }

        .lb-rank {
            font-weight: 700;
            color: #667eea;
            min-width: 24px;
        }

        .lb-rank.top1 {
            color: #ffd700;
        }

        .lb-name {
            flex: 1;
            margin: 0 12px;
        }

        .lb-points {
            text-align: right;
            font-weight: 700;
            color: #667eea;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="header-left">🎯 RAID</div>
            <div class="header-right">
                <div>
                    <div style="font-size: 11px; color: #888;">Points</div>
                    <div id="userPoints" style="font-size: 18px; font-weight: 700;">0</div>
                </div>
                <div class="badge">
                    <span id="userRank">#1</span>
                </div>
            </div>
        </div>

        <!-- Stats -->
        <div class="stats-row">
            <div class="stat"><span id="streakLabel">Streak</span> <span class="stat-value" id="streakValue">0d</span></div>
            <div class="stat"><span id="speedLabel">Speed</span> <span class="stat-value" id="speedValue">0</span></div>
        </div>

        <!-- Tweet Card -->
        <div id="tweetCard" class="tweet-card">
            <div class="tweet-handle" id="tweetHandle">@...</div>
            <div class="tweet-text" id="tweetText">Loading raid...</div>
        </div>

        <!-- Brand Tabs -->
        <div class="brand-tabs">
            <button class="brand-tab active" data-brand="spong" onclick="switchBrand('spong')">🍄 Spong</button>
            <button class="brand-tab" data-brand="kilroy" onclick="switchBrand('kilroy')">😈 Kilroy</button>
            <button class="brand-tab" data-brand="motion" onclick="switchBrand('motion')">✨ Motion</button>
        </div>

        <!-- Gallery -->
        <div class="gallery-section">
            <div class="gallery-label">Pick your weapon:</div>
            <div id="galleryGrid" class="gallery-grid"></div>
            <div id="imageTags" class="image-tags"></div>
        </div>

        <!-- Action Buttons -->
        <div class="action-buttons">
            <button class="btn btn-action" onclick="doAction('retweet')">
                <span class="btn-emoji">🔄</span>
                <span class="btn-label">Retweet</span>
                <span class="btn-value">+5</span>
            </button>
            <button class="btn btn-action" onclick="doAction('like')">
                <span class="btn-emoji">❤️</span>
                <span class="btn-label">Like</span>
                <span class="btn-value">+2</span>
            </button>
            <button class="btn btn-action" onclick="doAction('reply')">
                <span class="btn-emoji">💬</span>
                <span class="btn-label">Reply</span>
                <span class="btn-value">+10</span>
            </button>
        </div>

        <!-- Leaderboard -->
        <div class="leaderboard-section">
            <div class="leaderboard-title">🏆 Top Raiders</div>
            <div id="leaderboardContainer"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@twa-dev/sdk@latest/dist/index.umd.js"></script>
    <script>
        const API_URL = window.location.origin;
        const tg = window.Telegram?.WebApp;
        let currentUser = null;
        let currentRaid = null;
        let currentBrand = "spong";
        let selectedImageId = null;
        let allGalleries = {};

        if (tg) {
            tg.ready();
            tg.expand();
        }

        // Parse raid ID from URL
        const raidId = new URLSearchParams(window.location.search).get("raid") || "latest";

        // Initialize
        async function init() {
            const initData = tg?.initDataUnsafe;
            if (initData?.user) {
                const user = initData.user;
                await authUser({
                    tg_id: user.id,
                    username: user.username || `user_${user.id}`,
                    first_name: user.first_name,
                    last_name: user.last_name || "",
                });
            } else {
                await authUser({
                    tg_id: 123456789,
                    username: "test_user",
                    first_name: "Test",
                    last_name: "User",
                });
            }
            await loadRaid();
            await loadGallery("spong");
            await loadLeaderboard();
        }

        async function authUser(userData) {
            try {
                const res = await fetch(`${API_URL}/auth`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(userData),
                });
                currentUser = await res.json();
                updateUserDisplay();
            } catch (e) {
                console.error("Auth failed:", e);
                showError("Connection failed");
            }
        }

        async function loadRaid() {
            try {
                const res = await fetch(`${API_URL}/raid/${raidId}`);
                if (!res.ok) throw new Error("Raid not found");
                currentRaid = await res.json();

                document.getElementById("tweetHandle").textContent = `@${currentRaid.x_handle || "?"}`;
                document.getElementById("tweetText").textContent = currentRaid.text || "";

                // Tap tweet to open X
                document.getElementById("tweetCard").onclick = () => {
                    if (currentRaid.tweet_url) {
                        if (tg) tg.openLink(currentRaid.tweet_url);
                        else window.open(currentRaid.tweet_url, "_blank");
                    }
                };

                // Set default brand from raid
                if (currentRaid.brand) {
                    currentBrand = currentRaid.brand;
                    switchBrand(currentBrand);
                }
            } catch (e) {
                console.error("Load raid failed:", e);
                showError("Could not load raid");
            }
        }

        async function loadGallery(brand) {
            try {
                const res = await fetch(`${API_URL}/gallery/${brand}`);
                const items = await res.json();
                allGalleries[brand] = items;

                const grid = document.getElementById("galleryGrid");
                if (items.length === 0) {
                    grid.innerHTML = `<div class="gallery-empty" style="grid-column: 1/-1;">No images yet for ${brand}</div>`;
                    return;
                }

                grid.innerHTML = items.map(item => `
                    <div class="gallery-item"
                         id="img-${item.id}"
                         style="background-image: url('${item.url}')"
                         onclick="selectImage('${item.id}', '${brand}', ${JSON.stringify(item).replace(/"/g, '&quot;')})">
                    </div>
                `).join("");

                // Clear selection when switching brands
                selectedImageId = null;
                document.getElementById("imageTags").textContent = "";
            } catch (e) {
                console.error("Load gallery failed:", e);
                showError(`Failed to load ${brand} gallery`);
            }
        }

        async function switchBrand(brand) {
            currentBrand = brand;
            document.querySelectorAll(".brand-tab").forEach(b => b.classList.remove("active"));
            document.querySelector(`[data-brand="${brand}"]`).classList.add("active");

            if (!allGalleries[brand]) {
                await loadGallery(brand);
            } else {
                renderGallery(brand);
            }
        }

        function renderGallery(brand) {
            const items = allGalleries[brand] || [];
            const grid = document.getElementById("galleryGrid");

            if (items.length === 0) {
                grid.innerHTML = `<div class="gallery-empty" style="grid-column: 1/-1;">No images yet for ${brand}</div>`;
                return;
            }

            grid.innerHTML = items.map(item => `
                <div class="gallery-item"
                     id="img-${item.id}"
                     style="background-image: url('${item.url}')"
                     onclick="selectImage('${item.id}', '${brand}', ${JSON.stringify(item).replace(/"/g, '&quot;')})">
                </div>
            `).join("");
        }

        function selectImage(imageId, brand, itemData) {
            document.querySelectorAll(".gallery-item").forEach(el => el.classList.remove("selected"));
            const el = document.getElementById("img-" + imageId);
            if (el) {
                el.classList.add("selected");
                selectedImageId = imageId;
                const tags = itemData.tags || [];
                document.getElementById("imageTags").textContent = tags.join(" · ");
            }
        }

        async function doAction(actionType) {
            if (!currentUser || !currentRaid) {
                showError("Not ready yet");
                return;
            }

            // Open X first (non-blocking)
            const intentUrls = {
                "retweet": `https://twitter.com/intent/retweet?tweet_id=${currentRaid.tweet_id}`,
                "like": `https://twitter.com/intent/like?tweet_id=${currentRaid.tweet_id}`,
                "reply": `https://twitter.com/intent/tweet?in_reply_to=${currentRaid.tweet_id}`,
            };

            if (tg) tg.openLink(intentUrls[actionType]);
            else window.open(intentUrls[actionType], "_blank");

            // Log to server (non-blocking)
            try {
                const res = await fetch(`${API_URL}/engage`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        post_id: raidId,
                        user_tg_id: currentUser.tg_id,
                        action_type: actionType,
                        image_id: selectedImageId || "",
                        image_brand: currentBrand,
                        raid_id: raidId,
                    }),
                });
                const data = await res.json();
                currentUser.points = data.user_points;
                currentUser.rank = data.user_rank;
                updateUserDisplay();
                showToast(`+${data.points_earned} pts!`);
                loadLeaderboard();
            } catch (e) {
                console.error("Engage failed:", e);
            }
        }

        async function loadLeaderboard() {
            try {
                const res = await fetch(`${API_URL}/leaderboard?limit=5`);
                const entries = await res.json();

                const html = entries.map((entry, i) => `
                    <div class="leaderboard-entry ${i === 0 ? "top1" : i === 1 ? "top2" : i === 2 ? "top3" : ""}">
                        <div class="lb-rank ${i < 3 ? "top" + (i + 1) : ""}">
                            ${i === 0 ? "🥇" : i === 1 ? "🥈" : i === 2 ? "🥉" : "#" + (i + 1)}
                        </div>
                        <div class="lb-name">${escapeHtml(entry.username)}</div>
                        <div class="lb-points">${entry.points}</div>
                    </div>
                `).join("");

                document.getElementById("leaderboardContainer").innerHTML = html || "<div style='color: #666;'>Loading...</div>";
            } catch (e) {
                console.error("Load leaderboard failed:", e);
            }
        }

        function updateUserDisplay() {
            if (!currentUser) return;
            document.getElementById("userPoints").textContent = currentUser.points || 0;
            document.getElementById("userRank").textContent = `#${currentUser.rank || 1}`;
        }

        function showToast(message) {
            const toast = document.createElement("div");
            toast.className = "toast";
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }

        function showError(message) {
            const error = document.createElement("div");
            error.className = "error";
            error.textContent = message;
            document.body.insertBefore(error, document.querySelector(".container"));
            setTimeout(() => error.remove(), 3000);
        }

        function escapeHtml(text) {
            const map = { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;" };
            return (text || "").replace(/[&<>"']/g, m => map[m]);
        }

        // Poll leaderboard every 15 seconds
        setInterval(loadLeaderboard, 15000);

        // Start
        init();
    </script>
</body>
</html>
